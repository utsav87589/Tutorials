{% extends 'blogs/base.html' %}

{% block content %}
{% for car in cars %}
    <article class="media content-section">
    <div class="media-body">
    <div class="article-metadata">
        <a class="mr-2" href="#">{{ car.brand }}</a>
        <small class="text-muted">{{ car.model }}</small>
    </div>
    <h2><a class="article-title" href="#">{{ car.color }}</a></h2>
    <p class="article-content">{{ car.model }}</p>
    </div>
    </article>
{% endfor %}
{% endblock %}
